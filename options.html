<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Study Heatmap — Settings</title>
    <link rel="stylesheet" href="options.css" />
  </head>
  <body>
    <main class="wrap">
      <header>
        <h1>Settings</h1>
        <p class="lead">
          Each line is a rule: <code>hostname</code> or <code>hostname/path</code> (path prefix). No
          <code>https://</code>. Subdomains match the base host (e.g. <code>google.com</code> matches
          <code>docs.google.com</code>). <strong>Productive rules win</strong> if both lists match.
        </p>
      </header>

      <section class="prefs" aria-label="Goals and notifications">
        <label class="inline">
          <span>Daily productive goal (minutes)</span>
          <input type="number" id="dailyGoal" min="1" max="1440" step="1" aria-describedby="dailyHint" />
          <span id="dailyHint" class="field-hint">Streak uses this target.</span>
        </label>
        <label class="inline">
          <span>Weekly productive goal (minutes)</span>
          <input type="number" id="weeklyGoal" min="1" max="10080" step="1" aria-describedby="weeklyHint" />
          <span id="weeklyHint" class="field-hint">Shown in the popup and weekly report (ISO week).</span>
        </label>
        <label class="check">
          <input type="checkbox" id="pomodoroNotify" aria-describedby="notifyHint" />
          <span>Pomodoro phase notifications (system banner)</span>
        </label>
        <p id="notifyHint" class="field-hint">
          Chrome will prompt for the <strong>notifications</strong> permission when you save with this on.
        </p>
        <p id="notifyWarn" class="warn" hidden role="status"></p>
        <label class="inline">
          <span>Focus override duration (minutes)</span>
          <input type="number" id="focusOverrideDuration" min="1" max="180" step="1" aria-describedby="ovDurHint" />
          <span id="ovDurHint" class="field-hint">How long “Allow temporarily” keeps distractions unblocked.</span>
        </label>
        <label class="inline">
          <span>Focus override cooldown (minutes)</span>
          <input type="number" id="focusOverrideCooldown" min="1" max="720" step="1" aria-describedby="ovCoolHint" />
          <span id="ovCoolHint" class="field-hint">Minimum wait between override uses.</span>
        </label>
      </section>

      <div class="cols">
        <label class="field">
          <span class="title productive">Productive</span>
          <textarea id="productive" rows="14" spellcheck="false" placeholder="github.com&#10;youtube.com/playlist" title="One rule per line"></textarea>
        </label>
        <label class="field">
          <span class="title distraction">Distraction</span>
          <textarea id="distraction" rows="14" spellcheck="false" placeholder="youtube.com&#10;reddit.com/r/memes" title="One rule per line"></textarea>
        </label>
      </div>

      <div class="actions">
        <span id="status" class="status" aria-live="polite"></span>
        <button type="button" id="save" class="primary">Save</button>
      </div>
    </main>
    <script type="module" src="options.js"></script>
  </body>
</html>
