<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Study Heatmap</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <header class="top">
      <div class="brand">
        <span class="logo" aria-hidden="true"></span>
        <div>
          <h1>Study Heatmap</h1>
          <p class="sub">Today’s focus at a glance</p>
        </div>
      </div>
      <button type="button" id="openDash" class="linkish" title="Full dashboard">Dashboard</button>
    </header>

    <section class="goal-row" id="goalRow" aria-label="Daily goal and streak">
      <div class="goal-metric">
        <span class="label">Goal</span>
        <strong id="goalText">—</strong>
      </div>
      <div class="goal-metric">
        <span class="label">Streak</span>
        <strong id="streakText">—</strong>
      </div>
    </section>

    <section class="today" id="todayCard">
      <div class="metric">
        <span class="label">Productive</span>
        <strong id="todayProd">—</strong>
      </div>
      <div class="metric">
        <span class="label">Distraction</span>
        <strong id="todayDist">—</strong>
      </div>
      <div class="metric">
        <span class="label">Focus ratio</span>
        <strong id="todayRatio">—</strong>
      </div>
    </section>

    <section class="pause" aria-label="Pause tracking">
      <h2>Pause tracking</h2>
      <p class="hint" id="pauseHint">Skip counting time briefly (e.g. research rabbit holes).</p>
      <div class="pause-row">
        <button type="button" class="ghost sm" data-pause="15">15m</button>
        <button type="button" class="ghost sm" data-pause="30">30m</button>
        <button type="button" class="ghost sm" data-pause="60">1h</button>
        <button type="button" class="ghost sm" id="pauseClear">Clear</button>
      </div>
    </section>

    <section class="session">
      <h2>Study session</h2>
      <p class="hint">Timer runs while Chrome is focused. Pomodoro sends optional system notifications.</p>
      <label class="select-label" for="pomodoroPreset">Pomodoro</label>
      <select id="pomodoroPreset" class="select">
        <option value="">Off — open session</option>
        <option value="25,5">25 / 5</option>
        <option value="50,10">50 / 10</option>
        <option value="90,15">90 / 15</option>
      </select>
      <p class="pomodoro-status" id="pomodoroStatus" hidden></p>
      <div class="session-row">
        <span id="sessionStatus" class="pill idle">No active session</span>
        <div class="btns">
          <button type="button" id="btnStart" class="primary">Start</button>
          <button type="button" id="btnStop" class="ghost" disabled>Stop</button>
        </div>
      </div>
    </section>

    <footer class="foot">
      <button type="button" id="openOnboard" class="linkish">How it works</button>
      <button type="button" id="openOpts" class="linkish">Site lists</button>
    </footer>

    <script type="module" src="popup.js"></script>
  </body>
</html>
